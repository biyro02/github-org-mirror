name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell scripts
        run: |
          fail=0
          for f in *.sh; do
            bash -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; fail=1; }
          done
          exit $fail
