name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── 1. Bash syntax check ─────────────────────────────────────────────────
  lint:
    name: Bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell scripts
        run: |
          fail=0
          for f in *.sh; do
            bash -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; fail=1; }
          done
          exit $fail

  # ── 2. webhook.py unit tests (no credentials needed) ─────────────────────
  test-webhook:
    name: Webhook receiver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: printf 'GITHUB_TOKEN=dummy\nGITHUB_ORG=test-org\nWEBHOOK_SECRET=test-secret-ci\n' > .env

      - name: Start webhook receiver
        run: python3 webhook.py &

      - name: Wait for startup
        run: sleep 2

      - name: POST to wrong path should return 404
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:9876/wrong-path)
          echo "Got: $code"
          [ "$code" = "404" ] && echo "PASS" || (echo "FAIL: expected 404"; exit 1)

      - name: POST with bad signature should return 401
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=invalidsignature" \
            -d '{"repository":{"name":"test-repo"}}' \
            http://127.0.0.1:9876/github-webhook)
          echo "Got: $code"
          [ "$code" = "401" ] && echo "PASS" || (echo "FAIL: expected 401"; exit 1)

      - name: POST with valid HMAC signature should return 200
        run: |
          PAYLOAD='{"repository":{"name":"test-repo"}}'
          SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac 'test-secret-ci' | awk '{print $2}')"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            http://127.0.0.1:9876/github-webhook)
          echo "Got: $code"
          [ "$code" = "200" ] && echo "PASS" || (echo "FAIL: expected 200"; exit 1)

      - name: repository.created event should return 200
        run: |
          PAYLOAD='{"action":"created","repository":{"name":"new-repo"}}'
          SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac 'test-secret-ci' | awk '{print $2}')"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: repository" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            http://127.0.0.1:9876/github-webhook)
          echo "Got: $code"
          [ "$code" = "200" ] && echo "PASS" || (echo "FAIL: expected 200"; exit 1)

  # ── 3. mirror-sync.sh + sync-repo.sh ─────────────────────────────────────
  test-sync:
    name: Mirror sync scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf 'GITHUB_TOKEN=%s\nGITHUB_ORG=Uruba-Software\nWEBHOOK_SECRET=ci-test\n' "$GH_TOKEN" > .env
          chmod 600 .env

      - name: Run mirror-sync.sh
        run: bash mirror-sync.sh

      - name: Verify repos were cloned
        run: |
          count=$(ls repos/ | wc -l)
          echo "Repos cloned: $count"
          [ "$count" -gt 0 ] && echo "PASS" || (echo "FAIL: no repos cloned"; exit 1)

      - name: Run sync-repo.sh on first repo
        run: |
          repo=$(ls repos/ | head -1 | sed 's/\.git$//')
          echo "Re-syncing: $repo"
          bash sync-repo.sh "$repo"
          echo "PASS"

  # ── 4. install.sh end-to-end ──────────────────────────────────────────────
  test-install:
    name: install.sh end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y -qq python3 git curl openssl

      - name: Create .env
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf 'GITHUB_TOKEN=%s\nGITHUB_ORG=Uruba-Software\nWEBHOOK_SECRET=ci-install-test\n' "$GH_TOKEN" > .env
          chmod 600 .env

      - name: Run install.sh
        run: sudo bash install.sh /tmp/mirror-test

      - name: Verify installed files
        run: |
          for f in mirror-sync.sh sync-repo.sh webhook.py .env; do
            [ -f "/tmp/mirror-test/$f" ] && echo "PASS: $f" || (echo "FAIL: $f missing"; exit 1)
          done

      - name: Verify repos were cloned
        run: |
          count=$(ls /tmp/mirror-test/repos/ 2>/dev/null | wc -l)
          echo "Repos: $count"
          [ "$count" -gt 0 ] && echo "PASS" || (echo "FAIL: repos/ empty"; exit 1)

      - name: Verify webhook responds after install
        run: |
          python3 /tmp/mirror-test/webhook.py &
          sleep 2
          PAYLOAD='{"repository":{"name":"test"}}'
          SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac 'ci-install-test' | awk '{print $2}')"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            http://127.0.0.1:9876/github-webhook)
          echo "Got: $code"
          [ "$code" = "200" ] && echo "PASS" || (echo "FAIL: expected 200"; exit 1)
