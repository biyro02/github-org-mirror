name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Bash syntax check ─────────────────────────────────────────────────
  lint:
    name: Bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all shell scripts
        run: |
          for f in *.sh; do
            bash -n "$f" && echo "OK: $f"
          done

  # ── 2. webhook.py unit tests (no credentials needed) ─────────────────────
  test-webhook:
    name: Webhook receiver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env <<EOF
          GITHUB_TOKEN=dummy
          GITHUB_ORG=test-org
          WEBHOOK_SECRET=test-secret-ci
          EOF

      - name: Start webhook receiver
        run: |
          python3 webhook.py &
          echo $! > /tmp/webhook.pid
          sleep 2

      - name: POST to wrong path → 404
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://127.0.0.1:9876/wrong-path)
          [ "$code" = "404" ] \
            && echo "PASS: 404 on wrong path" \
            || (echo "FAIL: expected 404, got $code"; exit 1)

      - name: POST with bad signature → 401
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=invalidsignature" \
            -d '{"repository":{"name":"test-repo"}}' \
            http://127.0.0.1:9876/github-webhook)
          [ "$code" = "401" ] \
            && echo "PASS: 401 on bad signature" \
            || (echo "FAIL: expected 401, got $code"; exit 1)

      - name: POST with valid HMAC signature → 200
        run: |
          PAYLOAD='{"repository":{"name":"test-repo"}}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac 'test-secret-ci' | awk '{print $2}')"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            http://127.0.0.1:9876/github-webhook)
          [ "$code" = "200" ] \
            && echo "PASS: 200 on valid signature" \
            || (echo "FAIL: expected 200, got $code"; exit 1)

      - name: repository.created event → 200
        run: |
          PAYLOAD='{"action":"created","repository":{"name":"new-repo"}}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac 'test-secret-ci' | awk '{print $2}')"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: repository" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            http://127.0.0.1:9876/github-webhook)
          [ "$code" = "200" ] \
            && echo "PASS: 200 on repository.created" \
            || (echo "FAIL: expected 200, got $code"; exit 1)

      - name: Stop webhook receiver
        if: always()
        run: kill $(cat /tmp/webhook.pid) 2>/dev/null || true

  # ── 3. mirror-sync.sh + sync-repo.sh (public repos, auto token) ──────────
  test-sync:
    name: Mirror sync scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env <<EOF
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG=biyro02
          WEBHOOK_SECRET=ci-test
          EOF
          chmod 600 .env

      - name: Run mirror-sync.sh
        run: bash mirror-sync.sh

      - name: Verify at least one repo cloned
        run: |
          count=$(ls repos/ | wc -l)
          echo "Repos cloned: $count"
          [ "$count" -gt 0 ] \
            && echo "PASS" \
            || (echo "FAIL: no repos cloned"; exit 1)

      - name: Run sync-repo.sh on first cloned repo
        run: |
          repo=$(ls repos/ | head -1 | sed 's/\.git$//')
          echo "Re-syncing: $repo"
          bash sync-repo.sh "$repo"
          echo "PASS"

  # ── 4. install.sh end-to-end ──────────────────────────────────────────────
  test-install:
    name: install.sh end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y -qq python3 git curl openssl

      - name: Create .env
        run: |
          cat > .env <<EOF
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG=biyro02
          WEBHOOK_SECRET=ci-install-test
          EOF
          chmod 600 .env

      - name: Run install.sh
        run: sudo bash install.sh /tmp/mirror-test

      - name: Verify installed files exist
        run: |
          for f in mirror-sync.sh sync-repo.sh webhook.py .env; do
            [ -f "/tmp/mirror-test/$f" ] \
              && echo "PASS: $f" \
              || (echo "FAIL: $f missing"; exit 1)
          done

      - name: Verify repos directory populated
        run: |
          count=$(ls /tmp/mirror-test/repos/ 2>/dev/null | wc -l)
          echo "Repos: $count"
          [ "$count" -gt 0 ] \
            && echo "PASS" \
            || (echo "FAIL: repos/ empty"; exit 1)

      - name: Verify webhook starts
        run: |
          python3 /tmp/mirror-test/webhook.py &
          sleep 2
          PAYLOAD='{"repository":{"name":"test"}}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac 'ci-install-test' | awk '{print $2}')"
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            http://127.0.0.1:9876/github-webhook)
          [ "$code" = "200" ] \
            && echo "PASS: webhook responds after install" \
            || (echo "FAIL: expected 200, got $code"; exit 1)
